<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>📚 Library Dashboard</h1>
        <button id="themeToggle">🌙 Toggle Dark Mode</button>
    </header>

    <div id="toastContainer" class="toast-container"></div>
    <div id="loadingSpinner" class="spinner hidden"></div>

    <!-- Dashboard Statistics -->
    <section class="dashboard-stats">
        <div class="card">
            <h3>Total Books</h3>
            <p id="statTotalBooks">0</p>
        </div>
        <div class="card">
            <h3>Available</h3>
            <p id="statAvailable">0</p>
        </div>
        <div class="card">
            <h3>Borrowed</h3>
            <p id="statBorrowed">0</p>
        </div>
        <div class="card">
            <h3>Borrowers</h3>
            <p id="statBorrowers">0</p>
        </div>
    </section>

    <!-- Controls -->
    <main class="container">
        <section class="controls">
            <input type="text" id="searchBar" placeholder="Search by title or author...">
            <select id="filterCategory">
                <option value="">All Categories</option>
                <option value="Fiction">Fiction</option>
                <option value="Science">Science</option>
                <option value="History">History</option>
            </select>
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="Available">Available</option>
                <option value="Borrowed">Borrowed</option>
            </select>
            <select id="sortBy">
                <option value="title">Sort by Title</option>
                <option value="author">Sort by Author</option>
            </select>
        </section>

        <!-- Book Operations Forms -->
        <section class="actions">
            <div class="form-box">
                <h3>Add New Book</h3>
                <form id="bookForm">
                    <input type="text" id="bookTitle" placeholder="Title" required>
                    <input type="text" id="bookAuthor" placeholder="Author" required>
                    <input type="text" id="bookCategory" placeholder="Category">
                    <input type="number" id="bookYear" placeholder="Year">
                    <input type="text" id="bookIsbn" placeholder="ISBN (Unique)" required>
                    <input type="text" id="bookCover" placeholder="Cover Image URL">
                    <button type="submit">Save Book</button>
                </form>
            </div>

            <div class="form-box">
                <h3>Issue Book (Loan)</h3>
                <form id="loanForm">
                    <input type="number" id="loanBookId" placeholder="Book ID" required>
                    <input type="number" id="loanBorrowerId" placeholder="Borrower ID" required>
                    <input type="date" id="loanDate" required>
                    <input type="date" id="returnDate" required>
                    <button type="submit">Issue Book</button>
                </form>
            </div>
        </section>

        <!-- Books View Grid -->
        <h2>Books Catalog</h2>
        <div id="noBooksMessage" class="no-data hidden">⚠️ No books found in the library catalog.</div>
        <div id="booksGrid" class="grid"></div>
    </main>

    <script src="app.js"></script>
</body>

</html>

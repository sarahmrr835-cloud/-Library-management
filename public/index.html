<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header Controls -->
        <header style="position: relative;">
            <h1>📚 Library Management System</h1>
            <p>Manage your books and borrowings all in one place</p>
            <button id="theme-toggle"
                style="position: absolute; top: 10px; right: 10px; background: #e2e8f0; color: #1e293b; padding: 8px 12px; font-size: 0.9rem; cursor: pointer; border: none; border-radius: 6px; font-weight: 600;">🌙
                Dark Mode</button>
        </header>

        <!-- Dynamic Statistics Cards -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Books</h3>
                <p id="total-books">0</p>
            </div>
            <div class="stat-card">
                <h3>Available</h3>
                <p id="available-books" style="color: var(--success-color);">0</p>
            </div>
            <div class="stat-card">
                <h3>Borrowed</h3>
                <p id="borrowed-books" style="color: var(--danger-color);">0</p>
            </div>
        </div>

        <main>
            <!-- Form Section -->
            <section class="form-section">
                <h2>Add New Book</h2>
                <form id="book-form">
                    <div class="form-group">
                        <label for="book-title">Book Title:</label>
                        <input type="text" id="book-title" required placeholder="Enter book title">
                    </div>
                    <div class="form-group">
                        <label for="book-author">Author Name:</label>
                        <input type="text" id="book-author" required placeholder="Enter author name">
                    </div>
                    <button type="submit" class="btn-add">Add to Library</button>
                </form>
            </section>

            <!-- Book List Section -->
            <section class="list-section">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;">
                    <h2 style="border: none; margin: 0; padding: 0;">Available Books (<span id="book-count">0</span>)
                    </h2>
                    <button id="export-btn"
                        style="background-color: #0f172a; color: white; padding: 8px 16px; font-size: 0.9rem; cursor: pointer; border: none; border-radius: 6px; font-weight: 600;">📥
                        Export to CSV</button>
                </div>

                <!-- Search & Filters -->
                <div class="controls" style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="search-input" placeholder="Search by title or author..." style="flex: 1;">
                    <select id="filter-status"
                        style="padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; outline: none; background: white; font-weight: 600; cursor: pointer;">
                        <option value="all">All Books</option>
                        <option value="available">Available</option>
                        <option value="borrowed">Borrowed</option>
                    </select>
                </div>

                <!-- Table Container -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Author</th>
                                <th>Status</th>
                                <th>Borrowed Date</th>
                                <th>Due Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="books-table-body">
                            <!-- Injected by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"
        style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px;">
    </div>

    <script src="script.js"></script>
</body>

</html>
